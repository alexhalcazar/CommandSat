name: tests CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          node-version: 20
      - name: Install root dependencies
        run: npm ci

      - name: Backend tests
        run: |
          cd backend
          npm ci
          npm test

      - name: Frontend tests
        run: |
          cd frontend
          npm ci
          npm test
