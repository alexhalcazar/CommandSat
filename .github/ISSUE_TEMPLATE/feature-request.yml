name: Feature Request
description: Submit a new feature request
labels: ['enhancement']
assignees: ['alexhalcazar']
type: feature
body:
    - type: dropdown
      id: role
      attributes:
          label: As a...
          options:
              - Admin
              - Developer
              - User
      validations:
          required: true
    - type: input
      id: goal
      attributes:
          label: I want to...
          placeholder: Describe the feature
      validations:
          required: true
    - type: textarea
      id: reason
      attributes:
          label: So that...
          placeholder: Explain the benefit or problem it solves
      validations:
          required: true
